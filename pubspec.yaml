name: vendia_pos
description: VendIA — POS inteligente para tenderos colombianos
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0

  # Animaciones y UI
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  flutter_svg: ^2.0.10+1
  rive: ^0.13.6

  # Almacenamiento seguro del JWT
  flutter_secure_storage: ^9.2.2

  # Almacenamiento local simple
  shared_preferences: ^2.3.3

  # Base de datos local offline-first
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.0

  # UUIDs para entidades
  uuid: ^4.0.0

  # Conectividad
  connectivity_plus: ^6.0.0

  # Escáner de código de barras (cámara nativa)
  mobile_scanner: ^7.2.0

  # Captura de fotos (facturas, productos)
  image_picker: ^1.1.2

  # QR para pagos Nequi/Daviplata
  qr_flutter: ^4.1.0

  # Deep links (WhatsApp)
  url_launcher: ^6.2.0

  # Native share sheet (WhatsApp, Messages, etc. for the Marketing Hub)
  share_plus: ^10.1.4

  # Variables de entorno
  flutter_dotenv: ^5.2.1

  # Audio (barcode beep)
  audioplayers: ^6.1.0

  # PDF generation + print/share
  pdf: ^3.11.1
  printing: ^5.13.3

  # Utilidades
  intl: ^0.19.0
  flutter_markdown: ^0.7.4 # render de descripción de eventos (negritas/títulos)
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  record: ^6.0.0
  image_cropper: ^12.2.1
  esc_pos_utils_plus: ^2.0.4
  image: ^4.8.0
  flutter_bluetooth_serial: ^0.4.0
  usb_serial: ^0.5.2 # impresora térmica por USB (SAT N140 + DIG-E200I)
  permission_handler: ^12.0.1
  http: ^1.6.0

  # Spec 081 — mapa de mercados cercanos (OpenStreetMap, gratis, sin llave).
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # CAPTCHA Cloudflare Turnstile — Spec F024
  cloudflare_turnstile: ^3.6.2
  file_picker: ^11.0.2
  csv: ^8.0.0
  archive: ^4.0.9
  xml: ^6.6.1
  web: ^1.1.1

  # Spec 038 — Push Notifications (Web + Android via FCM).
  # firebase_core 3.15+ introdujo el canal pigeon nuevo
  # `dev.flutter.pigeon.firebase_core_platform_interface.FirebaseCoreHostApi`
  # que falla con `channel-error` en iPhone Safari PWA (verificado
  # 2026-05-29). Pinneamos a versiones pre-pigeon estables hasta que
  # firebase_core_web actualice el handler.
  firebase_core: 3.6.0
  firebase_messaging: 15.1.3
  flutter_local_notifications: ^17.2.4
  flutter_dynamic_icon_plus: ^1.4.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/vendia_icon_1024.png"
  adaptive_icon_background: "#0A2540" # azul profundo de marca (antes púrpura)
  adaptive_icon_foreground: "assets/images/vendia_icon_android.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/vendia_icon_1024.png"
    background_color: "#0A2540"
    theme_color: "#0E6BA8"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/rive/
    - assets/audio/
    - assets/onboarding/
    - assets/splash/             # Spec 087 — logos + mapas de orden (13 logos)
  # Tipografía de marca (Spec design system): Inter, equivalente libre a la
  # fuente de Apple (SF Pro). OFL — empaquetada para iOS/Android/web consistente.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="VendIA — POS inteligente para tenderos colombianos.">

  <!-- Color de tema del navegador (coherente con el ícono adaptativo Android) -->
  <meta name="theme-color" content="#667EEA">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VendIA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VendIA</title>
  <link rel="manifest" href="manifest.json">

  <!-- Polyfill de BarcodeDetector (zxing-wasm) — Safari/iOS NO implementa
       la API nativa, así que sin esto html5-qrcode cae a su decodificador
       ZXing-JS, mucho más débil en códigos 1D (EAN/UPC) sobre iPhone.
       Con el polyfill registrado ANTES, html5-qrcode lo detecta vía
       `useBarCodeDetectorIfSupported` y decodifica con el motor WASM.
       Self-hosted (44 KB); el zxing_reader.wasm (1 MB) se descarga LAZY
       solo cuando se abre el scanner, no al cargar la app. -->
  <script src="barcode-detector.min.js"></script>

  <!-- html5-qrcode — lector de códigos battle-tested en iOS Safari.
       Self-hosted desde el dominio (no CDN) para evitar bloqueos por
       anti-tracking de Safari iOS y aumentar la confiabilidad del
       deploy (el script no depende de un tercero). El archivo lo
       copia flutter build web desde `web/` a `build/web/`. -->
  <script src="html5-qrcode.min.js"></script>

  <!-- Spec 038 — Firebase JS SDK (compat) pre-cargado.
       firebase_core 3.x para Flutter web hace JS interop contra el
       objeto global `firebase`. Si no esta cargado antes de Flutter,
       initializeApp() falla con PlatformException(channel-error).
       FlutterFire CLI NO los inserta automaticamente — bug conocido.
       Mismo project config que lib/firebase_options.dart. -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: 'AIzaSyABFUzX-6VH2gSFg7myzj5mT-fECGJ0OMw',
      authDomain: 'vendia-prod.firebaseapp.com',
      projectId: 'vendia-prod',
      storageBucket: 'vendia-prod.firebasestorage.app',
      messagingSenderId: '43323748804',
      appId: '1:43323748804:web:e787bb056c40b70eccb491',
    });
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!--
    Spec 069 — auto-actualización del PWA. Los archivos de entrada de Flutter
    web no llevan hash (main.dart.js, el service worker), así que el PWA de iOS
    puede quedarse en un build viejo. Junto con los headers Cache-Control
    (vercel.json), esto fuerza al service worker a buscar versiones nuevas en
    cada carga y, cuando una toma control, recarga UNA vez para servir el build
    más reciente sin que el tendero tenga que limpiar caché a mano.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      var __vendiaReloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (__vendiaReloaded) return;
        __vendiaReloaded = true;
        window.location.reload();
      });
      navigator.serviceWorker.ready.then(function (reg) {
        try { reg.update(); } catch (e) {}
        // Si ya hay un SW nuevo esperando, pídele que tome control de inmediato.
        if (reg.waiting) {
          try { reg.waiting.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
        }
        reg.addEventListener('updatefound', function () {
          var sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', function () {
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              try { sw.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
            }
          });
        });
      }).catch(function () {});
    }
  </script>
</body>
</html>
